name: Generer une image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt github
        uses: actions/checkout@v4

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Generate image with DynaPictures API
        id: generate
        run: |
          set -euo pipefail

          COMMIT_MSG="${{ steps.commit.outputs.message }}"
          PAYLOAD=$(jq -n --arg text "$COMMIT_MSG" '{
            params: [
              {
                name: "text1",
                text: $text,
                color: "#333",
                backgroundColor: "#f9f9f9",
                borderColor: "#ddd",
                borderWidth: "1px",
                borderRadius: "5px",
                opacity: 1
              }
            ]
          }')

          # Call API, keep response body separate, and capture HTTP status code.
          HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "https://api.dynapictures.com/designs/${{ secrets.DYNAPICTURES_UID }}" \
            -H "Authorization: Bearer ${{ secrets.DYNAPICTURES }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "DynaPictures API request failed (HTTP $HTTP_STATUS)"
            echo "Response body:"
            cat response.json
            exit 1
          fi

          # Only parse with jq if the response is valid JSON.
          if ! jq -e . >/dev/null 2>&1 < response.json; then
            echo "DynaPictures response was not valid JSON"
            echo "Response body:"
            cat response.json
            exit 1
          fi

          IMAGE_URL=$(jq -r '.image_url // .imageUrl // .url // .data.image_url // .data.imageUrl // empty' response.json)

          if [ -z "$IMAGE_URL" ]; then
            echo "DynaPictures response did not contain an image URL"
            echo "Response JSON:"
            cat response.json
            exit 1
          fi

          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

      - name: Sauvegarder l'image générée
        run: |
          mkdir -p images
          TIMESTAMP=$(date +%s)
          curl -o "images/image-$TIMESTAMP.png" "${{ steps.generate.outputs.image_url }}"

      - name: Uploader l'artefact de l'image
        uses: actions/upload-artifact@v4
        with:
          name: image-generee
          path: images/image-*.png
          if-no-files-found: error
        

      - name: Generate index.html
        run: |
          {
            echo '<!DOCTYPE html>'
            echo '<html><head><meta charset="utf-8">'
            echo '<title>Generated Images</title>'
            echo '<style>body{font-family:Arial;margin:20px;background:#f5f5f5}.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}img{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}</style>'
            echo '</head><body>'
            echo '<h1>Generated Images</h1>'
            echo '<div class="gallery">'
            for f in images/image-*.png; do
              [ -e "$f" ] || continue
              base="$(basename "$f")"
              echo "<img src=\"$base\" alt=\"$base\">"
            done
            echo '</div>'
            echo '</body></html>'
          } > images/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./images