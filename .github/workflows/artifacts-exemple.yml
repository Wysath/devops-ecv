name: Gestion des artefacts

on:
  push:
    branches:
      - main
  workflow_dispatch:
    branches:
      - main

jobs:
  generate-file:
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt github
        uses: actions/checkout@v4

      - name: Générer un fichier texte
        run: echo "Ceci est un artefact généré automatiquement." > output.txt

      - name: Sauvegarder le fichier en tant qu'artefact
        uses: actions/upload-artifact@v3
        with:
          name: fichier-generer
          path: output.txt

    use-artifacts:
      runs-on: ubuntu-latest
      needs: generate-file
      steps:
        - name: Télécharger l'artefact stocké
          uses: actions/download-artifact@v3
          with:
            name: fichier-generer
            path: ./artifacts/
        - name: Afficher le contenu du fichier téléchargé
          run: cat ./artifacts/output.txt